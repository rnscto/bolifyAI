name: Deploy to Azure Container Apps (via GHCR)

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

env:
  CONTAINER_APP_NAME: 'bolifyai-api'
  RESOURCE_GROUP: 'bolifyai-rg'
  REGISTRY: 'ghcr.io'
  IMAGE_NAME: ${{ github.repository_owner }}/bolifyai-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        run: |
          # Convert IMAGE_NAME to lowercase to avoid GHCR restrictions
          LOWER_IMAGE_NAME=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          
          cd backend
          docker build -t ${{ env.REGISTRY }}/$LOWER_IMAGE_NAME:${{ github.sha }} .
          docker push ${{ env.REGISTRY }}/$LOWER_IMAGE_NAME:${{ github.sha }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        run: |
          LOWER_IMAGE_NAME=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/$LOWER_IMAGE_NAME:${{ github.sha }} \
            --registry-server ${{ env.REGISTRY }} \
            --registry-username ${{ github.actor }} \
            --registry-password ${{ secrets.GITHUB_TOKEN }} \
            --set-env-vars \
              "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
              "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
              "SMARTFLO_API_KEY=${{ secrets.SMARTFLO_API_KEY }}" \
              "AZURE_OPENAI_KEY=${{ secrets.AZURE_OPENAI_KEY }}" \
              "AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
              "AZURE_OPENAI_DEPLOYMENT=${{ secrets.AZURE_OPENAI_DEPLOYMENT }}"
